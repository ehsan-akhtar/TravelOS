document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

2Fdiv>\n  <div style=\"margin-top:14px;display:flex;align-items:center;justify-content:space-between\">\n    <div><div style=\"font-size:14px;font-weight:500;color:#0F172A\">Adults<\u002Fdiv><div style=\"font-size:11.5px;color:#94A3B8\">12+ years<\u002Fdiv><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px\">\n      <div onclick=\"{{ adultsMinus }}\" style=\"width:34px;height:34px;border-radius:17px;background:#F5F6FA;display:flex;align-items:center;justify-content:center;color:#334155;cursor:pointer;font-size:16px\">−<\u002Fdiv>\n      <div style=\"font-family:'Instrument Sans',sans-serif;font-weight:700;font-size:16px;color:#0F172A;min-width:18px;text-align:center\">{{ adults }}<\u002Fdiv>\n      <div onclick=\"{{ adultsPlus }}\" style=\"width:34px;height:34px;border-radius:17px;background:#EEF0FE;display:flex;align-items:center;justify-content:center;color:#4F46E5;cursor:pointer;font-size:16px\">+<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:14px;display:flex;align-items:center;justify-content:space-between\">\n    <div><div style=\"font-size:14px;font-weight:500;color:#0F172A\">Children<\u002Fdiv><div style=\"font-size:11.5px;color:#94A3B8\">2–11 years<\u002Fdiv><\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:14px\">\n      <div onclick=\"{{ childMinus }}\" style=\"width:34px;height:34px;border-radius:17px;background:#F5F6FA;display:flex;align-items:center;justify-content:center;color:#334155;cursor:pointer;font-size:16px\">−<\u002Fdiv>\n      <div style=\"font-family:'Instrument Sans',sans-serif;font-weight:700;font-size:16px;color:#0F172A;min-width:18px;text-align:center\">{{ children }}<\u002Fdiv>\n      <div onclick=\"{{ childPlus }}\" style=\"width:34px;height:34px;border-radius:17px;background:#EEF0FE;display:flex;align-items:center;justify-content:center;color:#4F46E5;cursor:pointer;font-size:16px\">+<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:16px;font-size:11px;letter-spacing:0.1em;color:#94A3B8;font-weight:600;text-transform:uppercase\">Cabin<\u002Fdiv>\n  <div style=\"margin-top:8px;display:flex;gap:8px\">\n    <sc-for list=\"{{ cabinChips }}\" as=\"cb\" hint-placeholder-count=\"3\">\n      <span onclick=\"{{ cb.onTap }}\" style=\"padding:8px 14px;border-radius:14px;background:{{ cb.bg }};color:{{ cb.color }};font-size:12.5px;font-weight:600;cursor:pointer;transition:background 0.2s,color 0.2s\">{{ cb.label }}<\u002Fspan>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <div onclick=\"{{ closeSheet }}\" style=\"margin-top:18px;height:48px;border-radius:24px;background:#4F46E5;color:#FFFFFF;display:flex;align-items:center;justify-content:center;font-family:'Instrument Sans',sans-serif;font-weight:600;font-size:14.5px;cursor:pointer\" style-active=\"transform:scale(0.98)\">Done<\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"position:absolute;inset:0;background:rgba(15,23,42,{{ whyBd }});transition:background 0.35s;pointer-events:{{ whyPe }};z-index:25\" onclick=\"{{ closeSheet }}\"><\u002Fdiv>\n<div style=\"position:absolute;left:0;right:0;bottom:0;background:#FFFFFF;border-radius:28px 28px 0 0;padding:18px 20px 34px;transform:translateY({{ whyTy }});transition:transform 0.42s cubic-bezier(0.32,0.72,0,1);z-index:26;box-shadow:0 -12px 40px rgba(15,23,42,0.14)\">\n  <div style=\"width:36px;height:4px;border-radius:2px;background:#E2E8F0;margin:0 auto 14px\"><\u002Fdiv>\n  <div style=\"display:flex;align-items:center;gap:10px\">\n    <span style=\"background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#FFFFFF;border-radius:10px;padding:4px 9px;font-size:10.5px;font-weight:700\">✦ AI pick<\u002Fspan>\n    <div style=\"font-family:'Instrument Sans',sans-serif;font-weight:700;font-size:18px;color:#0F172A\">Why this flight?<\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"margin-top:14px;display:flex;align-items:center;gap:10px\">\n    <div style=\"flex:1;height:6px;border-radius:3px;background:#EEF0F5;overflow:hidden\"><div style=\"height:100%;border-radius:3px;background:linear-gradient(90deg,#4F46E5,#7C3AED);width:{{ whyConfW }}\"><\u002Fdiv><\u002Fdiv>\n    <span style=\"font-family:'Instrument Sans',sans-serif;font-weight:700;font-size:14px;color:#4F46E5\">{{ whyConf }}% match<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"margin-top:14px;display:flex;flex-direction:column;gap:9px\">\n    <sc-for list=\"{{ whyReasons }}\" as=\"wr\" hint-placeholder-count=\"4\">\n      <div style=\"display:flex;gap:9px;font-size:13px;color:#334155;line-height:1.4;align-items:flex-start\"><span style=\"color:#22C55E;font-size:12px;margin-top:1px\">✓<\u002Fspan><span>{{ wr }}<\u002Fspan><\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <div style=\"margin-top:14px;background:#FAFBFC;border-radius:14px;padding:12px 14px\">\n    <div style=\"font-size:11px;letter-spacing:0.1em;color:#94A3B8;font-weight:600;text-transform:uppercase\">Rejected alternatives<\u002Fdiv>\n    <sc-for list=\"{{ whyRejected }}\" as=\"wj\" hint-placeholder-count=\"2\">\n      <div style=\"margin-top:8px;display:flex;gap:9px;font-size:12.5px;color:#64748B;line-height:1.4;align-items:flex-start\"><span style=\"color:#EF4444;font-size:11px;margin-top:1px\">✕<\u002Fspan><span>{{ wj }}<\u002Fspan><\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n  <div style=\"margin-top:12px;font-size:11.5px;color:#94A3B8;text-align:center\">128 fares considered · 7 shortlisted · verified {{ whyTs }}<\u002Fdiv>\n<\u002Fdiv>\n\n<div style=\"position:absolute;inset:0;display:{{ procDisplay }};align-items:center;justify-content:center;background:rgba(15,23,42,0.45);backdrop-filter:blur(6px);z-index:50\">\n  <div style=\"background:#FFFFFF;border-radius:24px;padding:24px 24px 20px;width:280px;box-shadow:0 24px 60px rgba(15,23,42,0.3);animation:screenIn 0.3s ease-out\">\n    <div style=\"font-family:'Instrument Sans',sans-serif;font-weight:700;font-size:17px;color:#0F172A\">Booking in progress<\u002Fdiv>\n    <div style=\"margin-top:14px;display:flex;flex-direction:column;gap:12px\">\n      <sc-for list=\"{{ procSteps }}\" as=\"ps\" hint-placeholder-count=\"3\">\n        <div style=\"display:flex;align-items:center;gap:11px;opacity:{{ ps.op }};transition:opacity 0.4s\">\n          <span style=\"display:{{ ps.showDone }};width:22px;height:22px;border-radius:11px;background:#22C55E;color:#FFFFFF;font-size:10px;align-items:center;justify-content:center;flex:none\">✓<\u002Fspan>\n          <span style=\"display:{{ ps.showRun }};width:22px;height:22px;border-radius:11px;border:2.5px solid #4F46E5;border-top-color:transparent;box-sizing:border-box;animation:spin 0.9s linear infinite;flex:none\"><\u002Fspan>\n          <span style=\"display:{{ ps.showQueue }};width:22px;height:22px;border-radius:11px;border:2px solid #E2E8F0;box-sizing:border-box;flex:none\"><\u002Fspan>\n          <span style=\"font-size:13px;color:#334155;font-weight:500\">{{ ps.label }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-import>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    now: Date.now(),\n    screen: 'home',\n    from: 'JFK', to: 'CDG',\n    depart: '2026-09-14', ret: '2026-09-21', oneWay: false,\n    adults: 2, children: 0, cabin: 'Economy', timePref: 'Any',\n    calY: 2026, calM: 8,\n    sheet: null, cityQuery: '',\n    messages: [], chatInput: '', typingUntil: 0, pendingReply: null,\n    runStart: 0,\n    leg: 1, selOut: null, selRet: null, sort: 'ai',\n    fare: null,\n    travelers: [], email: 'alex.rivera@example.com',\n    reviewStart: 0, dropApplied: false,\n    procStart: 0,\n    bookings: [],\n    notifs: [\n      { time: '09:12', text: 'Price watch armed for Paris routes', icon: '◉', k: 'info' },\n      { time: '08:47', text: 'Weather agent: mild September in Western Europe', icon: '✦', k: 'info' }\n    ],\n    toastMsg: '', toastUntil: 0,\n    pnr: '', lastTotal: 0,\n    whyFlight: null\n  };\n\n  CITIES = [\n    { code: 'JFK', city: 'New York', country: 'United States' },\n    { code: 'CDG', city: 'Paris', country: 'France' },\n    { code: 'LHR', city: 'London', country: 'United Kingdom' },\n    { code: 'HND', city: 'Tokyo', country: 'Japan' },\n    { code: 'FCO', city: 'Rome', country: 'Italy' },\n    { code: 'BCN', city: 'Barcelona', country: 'Spain' },\n    { code: 'LIS', city: 'Lisbon', country: 'Portugal' },\n    { code: 'AMS', city: 'Amsterdam', country: 'Netherlands' },\n    { code: 'BER', city: 'Berlin', country: 'Germany' },\n    { code: 'DXB', city: 'Dubai', country: 'UAE' },\n    { code: 'SIN', city: 'Singapore', country: 'Singapore' },\n    { code: 'SFO', city: 'San Francisco', country: 'United States' }\n  ];\n  AIRLINES = [\n    { n: 'Air France', s: 'AF', c: '#0B2D6B' },\n    { n: 'Delta', s: 'DL', c: '#9B1B32' },\n    { n: 'United', s: 'UA', c: '#005DAA' },\n    { n: 'Lufthansa', s: 'LH', c: '#0A1D3D' },\n    { n: 'KLM', s: 'KL', c: '#0091C9' },\n    { n: 'British Airways', s: 'BA', c: '#075AAA' },\n    { n: 'SWISS', s: 'LX', c: '#B3261E' },\n    { n: 'Iberia', s: 'IB', c: '#C8102E' }\n  ];\n  FARES = [\n    { id: 'light', name: 'Light', mult: 1, feats: ['Carry-on bag only', 'No changes or refunds', 'Seat assigned at check-in'] },\n    { id: 'standard', name: 'Standard', mult: 1.18, feats: ['1 checked bag included', 'Changes for a fee', 'Standard seat selection'] },\n    { id: 'flex', name: 'Flex', mult: 1.38, feats: ['2 checked bags included', 'Free changes anytime', 'Any seat + priority boarding'] }\n  ];\n  RUNT = [\n    { label: 'Parsing preferences', sub: 'Route, dates, travelers, cabin', a: 0, b: 0.7 },\n    { label: 'Querying 14 airlines', sub: 'Live availability across alliances', a: 0.7, b: 2.9 },\n    { label: 'Ranking 128 fares by fit', sub: 'Price, duration, schedule quality', a: 2.6, b: 4.2 },\n    { label: 'Checking schedule conflicts', sub: 'Calendar agent cross-check', a: 3.4, b: 4.8 },\n    { label: 'Verifying prices & seats', sub: 'QA agent final pass', a: 4.6, b: 5.5 }\n  ];\n  RUNAG = [\n    { short: 'FL', color: '#4F46E5' },\n    { short: 'PW', color: '#7C3AED' },\n    { short: 'SC', color: '#0891B2' },\n    { short: 'BO', color: '#22C55E' },\n    { short: 'QA', color: '#334155' }\n  ];\n  PROCT = [\n    { label: 'Locking fare with airline', a: 0, b: 1.1 },\n    { label: 'Running QA verification', a: 1.1, b: 2.2 },\n    { label: 'Issuing e-tickets', a: 2.2, b: 3.1 }\n  ];\n\n  componentDidMount() {\n    try {\n      const b = JSON.parse(localStorage.getItem('atlas_bookings_v1') || '[]');\n      if (Array.isArray(b) && b.length) this.setState({ bookings: b });\n    } catch (e) {}\n    this._iv = setInterval(() => this.tick(), 250);\n  }\n  componentWillUnmount() { clearInterval(this._iv); }\n\n  tick() {\n    const st = this.state, now = Date.now(), upd = { now };\n    if (st.screen === 'run' && st.runStart && now - st.runStart > 5800) {\n      upd.screen = 'results'; upd.runStart = 0;\n      upd.toastMsg = '128 fares ranked · showing top matches'; upd.toastUntil = now + 2600;\n      upd.notifs = [{ time: this.nowT(), text: 'Flight team ranked fares for ' + st.to, icon: '✦', k: 'info' }, ...st.notifs];\n    }\n    if (st.pendingReply && st.typingUntil && now >= st.typingUntil) {\n      upd.messages = [...st.messages, st.pendingReply];\n      upd.pendingReply = null; upd.typingUntil = 0;\n      this.scrollChat();\n    }\n    if (st.screen === 'review' && st.reviewStart && !st.dropApplied && now - st.reviewStart > 2200) {\n      upd.dropApplied = true;\n      upd.toastMsg = 'Price watch: fare dropped −€12'; upd.toastUntil = now + 2600;\n    }\n    if (st.procStart && now - st.procStart > 3300) { this.finalizeBooking(); return; }\n    this.setState(upd);\n  }\n\n  nowT() { const d = new Date(); return ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2); }\n  iso(d) { return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2); }\n  fmtD(isoStr) {\n    if (!isoStr) return '';\n    const d = new Date(isoStr + 'T12:00:00');\n    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });\n  }\n  cityOf(code) { return this.CITIES.find((c) => c.code === code) || this.CITIES[0]; }\n  tint(hex, a) { const n = parseInt(hex.slice(1), 16); return 'rgba(' + (n >> 16) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')'; }\n  toastNow(msg) { this.setState({ toastMsg: msg, toastUntil: Date.now() + 2600 }); }\n  genPNR() { const A = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let s = ''; for (let i = 0; i < 6; i++) s += A[Math.floor(Math.random() * A.length)]; return s; }\n  scrollChat() { setTimeout(() => { if (this._chat) this._chat.scrollTop = this._chat.scrollHeight + 400; }, 60); }\n\n  genFlights(from, to, date, timePref, sort) {\n    const seedStr = from + to + date;\n    let x = 7; for (const ch of seedStr) x = (x * 31 + ch.charCodeAt(0)) >>> 0;\n    const rnd = () => { x = (x * 1664525 + 1013904223) >>> 0; return x / 4294967296; };\n    const base = 340 + (x % 200);\n    const deps = [390, 470, 565, 660, 760, 900, 1120];\n    let fl = deps.map((d0, i) => {\n      const dep = d0 + Math.floor(rnd() * 45);\n      const stops = rnd() < 0.4 ? 1 : 0;\n      const dur = Math.round(base + rnd() * 80 + stops * 95);\n      const price = Math.round(205 + rnd() * 260 + (stops ? -55 : 35));\n      const al = this.AIRLINES[Math.floor(rnd() * this.AIRLINES.length)];\n      return { i, dep, arr: dep + dur + 60, dur, stops, price, al };\n    });\n    if (timePref === 'Morning') fl = fl.filter((f) => f.dep < 720);\n    if (timePref === 'Afternoon') fl = fl.filter((f) => f.dep >= 720 && f.dep < 1080);\n    if (timePref === 'Evening') fl = fl.filter((f) => f.dep >= 1080);\n    fl.forEach((f) => { f.score = f.price + f.dur * 0.55 + f.stops * 85; });\n    let bestScore = Infinity, bestI = -1;\n    fl.forEach((f) => { if (f.score < bestScore) { bestScore = f.score; bestI = f.i; } });\n    if (sort === h === 0 ? 'flex' : 'none',\n      outChipDisplay: (st.leg === 2 && st.selOut) ? 'flex' : 'none',\n      outChipText: st.selOut ? st.selOut.dep + '–' + st.selOut.arr + ' · ' + st.selOut.alName + ' · €' + st.selOut.price : '',\n      resBack: () => {\n        if (st.leg === 2) this.setState({ leg: 1, selOut: null });\n        else this.setState({ screen: 'home' });\n      },\n\n      selOutText: selText(st.selOut, 'Outbound'),\n      selRetText: selText(st.selRet, 'Return'),\n      selRetDisplay: st.selRet ? 'block' : 'none',\n      fares,\n      fareBack: () => this.setState({ screen: 'results' }),\n\n      travForms, email: st.email,\n      onEmail: (e) => this.setState({ email: e.target.value }),\n      paxBack: () => this.setState({ screen: 'fare' }),\n      paxBtnBg: paxValid ? '#4F46E5' : '#C7CBD6',\n      paxBtnColor: '#FFFFFF',\n      paxContinue: () => {\n        if (!paxValid) { this.toastNow('Fill in all traveler names'); return; }\n        this.setState({ screen: 'review', reviewStart: Date.now(), dropApplied: false });\n      },\n\n      reviewPaxLine: st.travelers.map((tv) => (tv.first + ' ' + tv.last).trim()).filter(Boolean).join(' · ') + ' · ' + st.cabin,\n      priceLines,\n      dropDisplay: st.dropApplied ? 'flex' : 'none',\n      totalLabel: total.toLocaleString('en-US'),\n      reviewBack: () => this.setState({ screen: 'pax' }),\n      confirmPay: () => this.setState({ procStart: Date.now() }),\n      procDisplay: st.procStart ? 'flex' : 'none',\n      procSteps,\n\n      pnr: st.pnr,\n      confFrom: st.from, confTo: st.to,\n      confDates: this.fmtD(st.depart) + (st.oneWay ? ' · One way' : ' – ' + this.fmtD(st.ret)),\n      confPax: (st.adults + st.children) + ' traveler' + (st.adults + st.children > 1 ? 's' : ''),\n      newSearch: () => this.setState({ screen: 'home', selOut: null, selRet: null, fare: null, leg: 1 }),\n\n      bookingCards: st.bookings.map((b) => ({ ...b, total: b.total.toLocaleString('en-US') })),\n      tripsEmptyDisplay: st.bookings.length === 0 ? 'flex' : 'none',\n      notifCards,\n\n      tabDisplay: (screen === 'home' || screen === 'trips' || screen === 'activity') ? 'flex' : 'none',\n      tabs,\n\n      toastText: st.toastMsg,\n      toastOp: now < st.toastUntil ? 1 : 0,\n      toastTy: now < st.toastUntil ? '0px' : '12px',\n\n      cityTitle: st.sheet === 'from' ? 'Flying from' : 'Flying to',\n      cityQuery: st.cityQuery,\n      onCityQuery: (e) => this.setState({ cityQuery: e.target.value }),\n      cityList,\n      cityTy: citySheet.ty, cityBd: citySheet.bd, cityPe: citySheet.pe,\n\n      calTy: cal.ty, calBd: cal.bd, calPe: cal.pe,\n      monthLabel: monthNames[st.calM] + ' ' + st.calY,\n      prevM: () => { const m = st.calM - 1; if (st.calY === 2026 && m < 6) return; this.setState(m < 0 ? { calM: 11, calY: st.calY - 1 } : { calM: m }); },\n      nextM: () => { const m = st.calM + 1; if (st.calY === 2026 && m > 11) return; this.setState(m > 11 ? { calM: 0, calY: st.calY + 1 } : { calM: m }); },\n      calCells: this.buildCalendar(),\n      calHint: st.oneWay ? 'One-way · pick your departure day' : (!st.ret ? 'Now pick your return day' : this.fmtD(st.depart) + ' → ' + this.fmtD(st.ret)),\n      setRT: () => this.setState({ oneWay: false }),\n      setOW: () => this.setState({ oneWay: true, ret: null }),\n      rtBg: !st.oneWay ? '#0F172A' : '#F5F6FA', rtColor: !st.oneWay ? '#FFFFFF' : '#64748B',\n      owBg: st.oneWay ? '#0F172A' : '#F5F6FA', owColor: st.oneWay ? '#FFFFFF' : '#64748B',\n\n      paxTy: paxSh.ty, paxBd: paxSh.bd, paxPe: paxSh.pe,\n      adults: st.adults, children: st.children,\n      adultsMinus: () => { if (st.adults > 1) this.setState({ adults: st.adults - 1 }); },\n      adultsPlus: () => { if (st.adults < 6) this.setState({ adults: st.adults + 1 }); },\n      childMinus: () => { if (st.children > 0) this.setState({ children: st.children - 1 }); },\n      childPlus: () => { if (st.children < 4) this.setState({ children: st.children + 1 }); },\n      cab
